<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title if title else "Mars mission" }}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #0f2847;
            background: #f2f2f2;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .top-line {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .mission-title {
            font-size: 52px;
            margin: 0;
        }
        .mission-name {
            font-size: 40px;
            margin: 0;
        }
        .subtitle {
            color: #b6b6b6;
            font-size: 34px;
            margin: 20px 0 30px;
        }
        h2 {
            text-align: center;
            font-size: 48px;
            margin: 30px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-line">
        <h1 class="mission-title">Миссия Колонизация Марса</h1>
        <p class="mission-name">Mars One</p>
    </div>
    <h3 class="subtitle">И на Марсе будут яблони цвести!</h3>
    {% block content %}{% endblock %}
</div>
</body>
</html>
